name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web UI (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm exec tsc -b
        working-directory: apps/web-ui
      - run: pnpm lint --filter @ttrpg/web-ui
      - name: Run tests with coverage
        run: pnpm test:coverage --filter @ttrpg/web-ui
      - name: Upload web coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/web-ui/coverage/coverage-final.json
          flags: web
        if: always()

  rust:
    name: Rust WASM (test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack and binaryen
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          # apt binaryen is too old for table.fill (misc 0x11) from current rustc.
          # Use a pinned release from GitHub instead.
          wget -q https://github.com/WebAssembly/binaryen/releases/download/version_119/binaryen-version_119-x86_64-linux.tar.gz
          tar -xzf binaryen-version_119-x86_64-linux.tar.gz
          sudo cp binaryen-version_119/bin/wasm-opt /usr/local/bin/wasm-opt
      - name: Run tests
        run: cargo test
        working-directory: packages/rust-core
      - name: WASM node tests
        run: wasm-pack test --node --test wasm_node
        working-directory: packages/rust-core
      - name: Install Chrome for browser tests
        uses: browser-actions/setup-chrome@v1
      - name: WASM browser tests
        run: wasm-pack test --headless --chrome --test wasm_browser
        working-directory: packages/rust-core
      - name: Build WASM
        run: wasm-pack build --target web --release --features wasm-start
        working-directory: packages/rust-core
      - name: Optimize WASM with wasm-opt
        run: wasm-opt -O -o packages/rust-core/pkg/ttrpg_rust_core_bg.wasm packages/rust-core/pkg/ttrpg_rust_core_bg.wasm

  server:
    name: Server (lint + test + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core-table
        run: pip install -e packages/core-table
      - name: Install server dependencies
        run: pip install -r apps/server/requirements.txt
      - name: Install lint/type-check tools
        run: pip install ruff mypy pytest-cov
      - name: Ruff lint
        run: ruff check apps/server packages/core-table
      - name: Mypy type check
        run: mypy apps/server --ignore-missing-imports --no-error-summary
        continue-on-error: true
      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml
        working-directory: apps/server
        env:
          PYTHONPATH: ${{ github.workspace }}/apps/server:${{ github.workspace }}/packages/core-table
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/server/coverage.xml
        if: always()
