name: CI

on:
  push:
    branches: [main, "feature/**", "feat/**"]
  pull_request:
    branches: [main]

jobs:
  docs:
    name: Current docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate current documentation
        run: python scripts/check_docs.py

  web:
    name: Web UI (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm exec tsc -b
        working-directory: apps/web-ui
      - run: pnpm lint --filter @ttrpg/web-ui
      - name: Run tests with coverage
        run: pnpm test:coverage --filter @ttrpg/web-ui
      - name: Build and package production UI
        run: |
          pnpm --filter @ttrpg/web-ui build
          python apps/server/scripts/package_web_ui.py
      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web-ui/coverage/
        if: always()

  rust:
    name: Rust WASM (test + coverage + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Run tests with coverage
        run: cargo llvm-cov --lib --lcov --output-path coverage.lcov
        working-directory: packages/rust-core
      - name: Upload Rust coverage
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: packages/rust-core/coverage.lcov
        if: always()
      - name: WASM node tests
        run: wasm-pack test --node --test wasm_node
        working-directory: packages/rust-core
      - name: Install Chrome for browser tests
        uses: browser-actions/setup-chrome@v1
      - name: WASM browser tests
        run: wasm-pack test --headless --chrome --test wasm_browser
        working-directory: packages/rust-core
      - name: Build WASM
        run: >-
          wasm-pack build
          --target web
          --release
          --out-dir ../../apps/web-ui/src/lib/wasm/generated
          --
          --features wasm-start
        working-directory: packages/rust-core
      - name: Verify tracked WASM is current
        run: git diff --exit-code -- apps/web-ui/src/lib/wasm/generated

  server:
    name: Server (lint + test + coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ttrpg_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ttrpg_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core-table
        run: pip install -e packages/core-table
      - name: Install server dependencies
        run: pip install -r apps/server/requirements.txt
      - name: Install lint/type-check tools
        run: pip install ruff mypy pytest-cov
      - name: Ruff lint
        run: ruff check apps/server packages/core-table
      - name: Mypy type check
        run: mypy apps/server --ignore-missing-imports --no-error-summary
        continue-on-error: true
      - name: PostgreSQL migration and behavior gates
        run: >-
          pytest
          tests/integration/test_alembic_baseline.py
          tests/integration/test_postgresql_contract.py
          --no-cov
        working-directory: apps/server
        env:
          TEST_POSTGRESQL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ttrpg_test
          PYTHONPATH: ${{ github.workspace }}/apps/server:${{ github.workspace }}/packages/core-table
      - name: Alembic head and drift gates
        run: |
          alembic current --check-heads
          alembic check
        working-directory: apps/server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ttrpg_test
      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml
        working-directory: apps/server
        env:
          PYTHONPATH: ${{ github.workspace }}/apps/server:${{ github.workspace }}/packages/core-table
      - name: Upload server coverage
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: apps/server/coverage.xml
        if: always()
