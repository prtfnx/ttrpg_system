[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
pythonpath = . tests ../../packages/core-table
norecursedirs = __pycache__ .git .venv htmlcov legacy
markers =
    unit: isolated unit tests with no I/O
    integration: tests that hit the real database or HTTP server
    e2e: end-to-end tests requiring a running server
    slow: tests that take longer than 1 second
filterwarnings =
addopts =
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --verbose
    -v

[coverage:run]
omit =
    database/migrations/*
    tests/*

[coverage:report]
fail_under = 60
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
