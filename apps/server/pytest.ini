[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
pythonpath = . tests ../../packages/core-table
norecursedirs = __pycache__ .git .venv htmlcov
filterwarnings =
addopts =
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --verbose
    -v
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
