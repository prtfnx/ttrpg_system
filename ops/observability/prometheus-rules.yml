groups:
  - name: ttrpg-release
    rules:
      - alert: TtrpgServiceUnavailable
        expr: up{job="ttrpg-server"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: TTRPG server is unavailable
          runbook_url: ops/observability/RUNBOOKS.md#service-unavailable

      - alert: TtrpgHighHttpErrorRate
        expr: |
          sum(rate(ttrpg_http_requests_total{status_class="5xx"}[5m]))
          /
          clamp_min(sum(rate(ttrpg_http_requests_total[5m])), 0.001) > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: More than 5% of HTTP requests return 5xx
          runbook_url: ops/observability/RUNBOOKS.md#high-http-error-rate

      - alert: TtrpgHighHttpLatency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(ttrpg_http_request_duration_seconds_bucket[10m]))
          ) > 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: HTTP p95 latency exceeds one second
          runbook_url: ops/observability/RUNBOOKS.md#high-http-latency

      - alert: TtrpgWebSocketFailures
        expr: increase(ttrpg_websocket_connections_total{outcome="error"}[10m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Repeated WebSocket server failures detected
          runbook_url: ops/observability/RUNBOOKS.md#websocket-failures

      - alert: TtrpgAssetOperationFailures
        expr: sum(increase(ttrpg_asset_operations_total{outcome="error"}[10m])) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Durable asset operations are failing
          runbook_url: ops/observability/RUNBOOKS.md#asset-operation-failures

      - alert: TtrpgBrowserErrorBurst
        expr: sum(increase(ttrpg_browser_errors_total[10m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Browser errors increased after a release
          runbook_url: ops/observability/RUNBOOKS.md#browser-error-burst

      - alert: TtrpgDatabaseErrors
        expr: sum(increase(ttrpg_database_operations_total{outcome="error"}[5m])) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Database operations are failing
          runbook_url: ops/observability/RUNBOOKS.md#database-errors-or-saturation

      - alert: TtrpgDatabasePoolSaturation
        expr: |
          ttrpg_database_pool_connections{state="checked_out"}
          /
          clamp_min(ttrpg_database_pool_connections{state="size"}, 1) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Database connection pool is persistently saturated
          runbook_url: ops/observability/RUNBOOKS.md#database-errors-or-saturation

      - alert: TtrpgPendingUploadStale
        expr: ttrpg_pending_uploads > 0 and ttrpg_pending_upload_oldest_age_seconds > 7200
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: A durable asset upload intent has been pending for over two hours
          runbook_url: ops/observability/RUNBOOKS.md#stale-pending-uploads

      - alert: TtrpgEmailDeliveryFailures
        expr: sum(increase(ttrpg_email_deliveries_total{outcome="error"}[15m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Repeated transactional email delivery failures detected
          runbook_url: ops/observability/RUNBOOKS.md#email-delivery-failures

      - alert: TtrpgRateLimitAnomaly
        expr: sum(increase(ttrpg_rate_limit_decisions_total{outcome="rejected"}[10m])) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Rate-limit rejections are unusually high
          runbook_url: ops/observability/RUNBOOKS.md#authentication-or-rate-limit-anomaly

      - alert: TtrpgOtlpExporterMissing
        expr: ttrpg_observability_exporter_configured{exporter="otlp_traces"} == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: OTLP trace export is not configured
          runbook_url: ops/observability/RUNBOOKS.md#telemetry-exporter-missing
