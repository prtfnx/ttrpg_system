[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["legacy", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["apps/server/tests", "packages/core-table/tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"
