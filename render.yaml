# Render.com deployment configuration
# Place this file at the repository root. Render.com reads it automatically.

services:
  - type: web
    name: ttrpg-server
    env: python
    plan: free  # Use 'starter' or 'standard' for paid plans
    rootDir: apps/server
    buildCommand: |
      pip install --upgrade pip
      pip install -e ../../packages/core-table
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
    healthCheckPath: /health
    autoDeploy: true
