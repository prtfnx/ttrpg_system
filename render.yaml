# Render.com deployment configuration
# Place this file at the repository root. Render.com reads it automatically.

services:
  - type: web
    name: ttrpg-server
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: |
      pip install --upgrade pip
      pip install -e packages/core-table
      pip install --require-hashes -r apps/server/requirements.txt
      pnpm install --frozen-lockfile
      pnpm --filter @ttrpg/web-ui build
      python apps/server/scripts/package_web_ui.py
    startCommand: cd apps/server && python scripts/migrate_and_start.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.14"
      - key: NODE_VERSION
        value: "22"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_MIGRATION_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: BASE_URL
        sync: false
      - key: METRICS_TOKEN
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: AUDIT_RETENTION_DAYS
        value: 365
      # Render is the only public ingress and supplies the first X-Forwarded-For value.
      - key: TRUST_PROXY_HEADERS
        value: true
      - key: SERVICE_NAME
        value: ttrpg-server
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      - key: R2_ENABLED
        value: true
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
    healthCheckPath: /health/ready
    autoDeploy: true
